- name: check local membership
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubeadm_local_membership

- name: check local admin config
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_local_admin

- name: check local certificate authority
  ansible.builtin.stat:
    path: /etc/kubernetes/pki/ca.key
  register: kubeadm_local_ca

- name: check local api access
  ansible.builtin.command:
    argv: [kubectl, --kubeconfig=/etc/kubernetes/admin.conf, get, --raw=/readyz]
  register: kubeadm_local_api
  changed_when: false
  failed_when: false
  when:
    - kubeadm_local_membership.stat.exists
    - kubeadm_local_admin.stat.exists
    - kubeadm_local_ca.stat.exists

- name: classify control plane nodes
  ansible.builtin.group_by:
    key: "{{ 'kubeadm_join_source_candidates' if kubeadm_local_membership.stat.exists and kubeadm_local_admin.stat.exists and kubeadm_local_ca.stat.exists and kubeadm_local_api.rc | default(1) == 0 else 'kubeadm_join_targets' if not kubeadm_local_membership.stat.exists else 'kubeadm_join_unhealthy' }}"
  changed_when: false

- name: require healthy credential source
  ansible.builtin.assert:
    that: groups.get('kubeadm_join_source_candidates', []) | length > 0
    fail_msg: No healthy control plane can generate join credentials.
  run_once: true

- name: select credential source
  ansible.builtin.set_fact:
    kubeadm_join_credential_source: "{{ groups['kubeadm_join_source_candidates'] | first }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true

- name: prepare join credentials
  when: groups.get('kubeadm_join_targets', []) | length > 0
  run_once: true
  block:
    - name: create join token
      ansible.builtin.command:
        argv: [kubeadm, token, create, --ttl, "{{ kubeadm_join_token_ttl }}", --print-join-command]
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
      register: kubeadm_join_command
      no_log: true

    - name: create certificate key
      ansible.builtin.command:
        argv: [openssl, rand, -hex, '32']
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
      register: kubeadm_certificate_key
      no_log: true

    - name: stage cluster config
      ansible.builtin.shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system get configmap kubeadm-config -o jsonpath='{.data.ClusterConfiguration}' > /run/kubeadm-cluster.yaml
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"

    - name: create temporary super admin config
      ansible.builtin.shell: kubeadm kubeconfig user --config /run/kubeadm-cluster.yaml --client-name=kubernetes-super-admin --org=system:masters > /run/kubeadm-super-admin.conf
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
      no_log: true

    - name: stage certificate key
      ansible.builtin.copy:
        content: "{{ kubeadm_certificate_key.stdout }}"
        dest: /run/kubeadm-certificate-key
        mode: '0600'
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
      no_log: true

    - name: upload control plane certificates
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs --certificate-key "$(cat /run/kubeadm-certificate-key)" --skip-certificate-key-print --kubeconfig /run/kubeadm-super-admin.conf
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
      register: kubeadm_uploaded_certs
      retries: 3
      delay: 10
      until: kubeadm_uploaded_certs.rc == 0

    - name: record join credentials
      ansible.builtin.set_fact:
        kubeadm_join_credentials:
          token: "{{ kubeadm_join_command.stdout | regex_search('--token ([^ ]+)', '\\1') | first }}"
          ca_hash: "{{ kubeadm_join_command.stdout | regex_search('--discovery-token-ca-cert-hash (sha256:[0-9a-f]+)', '\\1') | first }}"
          certificate_key: "{{ kubeadm_certificate_key.stdout }}"
      delegate_to: localhost
      delegate_facts: true
      no_log: true
  always:
    - name: remove temporary credential files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /run/kubeadm-cluster.yaml
        - /run/kubeadm-super-admin.conf
        - /run/kubeadm-certificate-key
      delegate_to: "{{ hostvars['localhost'].kubeadm_join_credential_source }}"
