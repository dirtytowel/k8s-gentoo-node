- name: create keepalived dir
  ansible.builtin.file:
    path: /etc/keepalived
    state: directory

- name: detect vip interface
  ansible.builtin.command: "ip -o -4 addr show to {{ ansible_host }}/32"
  register: node_address
  changed_when: false

- name: set vip interface
  ansible.builtin.set_fact:
    keepalived_interface: "{{ node_address.stdout | regex_search('^[0-9]+: ([^ ]+)', '\\1') | first }}"

- name: write apiserver check
  ansible.builtin.template:
    src: check_apiserver.sh.j2
    dest: /etc/keepalived/check_apiserver.sh
    mode: '0755'
  notify: restart keepalived

- name: write keepalived config
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
  notify: restart keepalived
