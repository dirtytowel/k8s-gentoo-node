- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    stage4: "{{ playbook_dir }}/../../catalyst/work/builds/default/stage4-amd64-k8s.tar.xz"
    disk_gb: 20
    artifact_dir: "{{ playbook_dir }}/../../vagrant"
    box_out: "{{ artifact_dir }}/k8s-node-ops-stage4.box"
    helper: "{{ playbook_dir }}/files/build-rootfs.sh"
    vagrant_pubkey: |
      ssh-rsa  vagrant insecure public key
      ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1YdxBpNlzxDqfJyw/QKow1F+wvG9hXGoqiysfJOn5Y vagrant insecure public key
    gentoo_repos_conf: |
      [DEFAULT]
      main-repo = gentoo

      [gentoo]
      location = /var/db/repos/gentoo
      sync-type = rsync
      sync-uri = rsync://rsync.gentoo.org/gentoo-portage
      auto-sync = yes
      sync-rsync-verify-jobs = 1
      sync-rsync-verify-metamanifest = yes
      sync-rsync-verify-max-age = 3
      sync-openpgp-key-package = sec-keys/openpgp-keys-gentoo-release
      sync-openpgp-key-path = /usr/share/openpgp-keys/gentoo-release.asc
      sync-openpgp-key-refresh = false-nowarn
  tasks:
    - name: check tools
      ansible.builtin.shell: "command -v {{ item }}"
      changed_when: false
      loop: [qemu-img, mke2fs, tar, unshare, newuidmap, newgidmap, truncate]

    - name: check stage4
      ansible.builtin.stat:
        path: "{{ stage4 }}"
      register: stage4_stat

    - name: require stage4
      ansible.builtin.assert:
        that: stage4_stat.stat.exists
        fail_msg: "Missing {{ stage4 }}. Run 'make stage4' first."

    - name: create temp build dir
      ansible.builtin.tempfile:
        state: directory
        path: /tmp
        prefix: ansible_vagrant_box_
        suffix: .tmp
      register: build_tmp

    - name: set build paths
      ansible.builtin.set_fact:
        build_dir: "{{ build_tmp.path }}"
        raw: "{{ build_tmp.path }}/root.img"
        qcow: "{{ build_tmp.path }}/box.img"
        overlay_dir: "{{ build_tmp.path }}/overlay"

    - name: create artifact directory
      ansible.builtin.file:
        path: "{{ artifact_dir }}"
        state: directory
        mode: '0755'

    - name: clean old build
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: ["{{ box_out }}", "{{ artifact_dir }}/vmlinuz", "{{ artifact_dir }}/initramfs"]

    - name: create overlay dirs
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode | default(omit) }}"
      loop:
        - {path: "{{ overlay_dir }}/root/.ssh", mode: '0700'}
        - {path: "{{ overlay_dir }}/etc/systemd/network"}
        - {path: "{{ overlay_dir }}/etc/portage/repos.conf"}
        - {path: "{{ overlay_dir }}/etc/systemd/system/multi-user.target.wants"}

    - name: write overlay config
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        content: "{{ item.content }}"
        mode: "{{ item.mode | default('0644') }}"
      loop:
        - {dest: "{{ overlay_dir }}/etc/systemd/network/80-vagrant-dhcp.network", content: "[Match]\nName=en* eth*\n\n[Network]\nDHCP=yes\n"}
        - {dest: "{{ overlay_dir }}/root/.ssh/authorized_keys", content: "{{ vagrant_pubkey }}", mode: '0600'}
        - {dest: "{{ overlay_dir }}/etc/portage/repos.conf/gentoo.conf", content: "{{ gentoo_repos_conf }}"}

    - name: enable overlay services
      ansible.builtin.file:
        src: "/usr/lib/systemd/system/{{ item }}.service"
        dest: "{{ overlay_dir }}/etc/systemd/system/multi-user.target.wants/{{ item }}.service"
        state: link
        force: true
        follow: false
      loop: [sshd, systemd-networkd, systemd-resolved, containerd, kubelet, keepalived]

    - name: link resolv.conf
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: "{{ overlay_dir }}/etc/resolv.conf"
        state: link
        force: true

    - name: build rootfs image
      ansible.builtin.command: "{{ helper }} {{ stage4 }} {{ build_dir }} {{ disk_gb }} {{ artifact_dir }}"

    - name: package box
      ansible.builtin.shell: "qemu-img convert -f raw -O qcow2 {{ raw }} {{ qcow }} && printf '%s\n' '{\"provider\":\"libvirt\",\"format\":\"qcow2\",\"virtual_size\":{{ disk_gb }}}' > {{ build_dir }}/metadata.json && tar czf {{ box_out }} -C {{ build_dir }} metadata.json box.img"

    - name: clean temp build
      ansible.builtin.file:
        path: "{{ build_dir }}"
        state: absent

    - name: print box path
      ansible.builtin.debug:
        msg: "{{ box_out }}"
