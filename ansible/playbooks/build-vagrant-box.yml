- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    stage4: "{{ playbook_dir }}/../../catalyst/work/builds/default/stage4-amd64-k8s.tar.xz"
    disk_gb: 20
    artifact_dir: "{{ playbook_dir }}/../../vagrant"
    box_out: "{{ artifact_dir }}/k8s-node-ops-stage4.box"
    vagrant_pubkey: |
      ssh-rsa  vagrant insecure public key
      ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN1YdxBpNlzxDqfJyw/QKow1F+wvG9hXGoqiysfJOn5Y vagrant insecure public key
    gentoo_repos_conf: |
      [DEFAULT]
      main-repo = gentoo

      [gentoo]
      location = /var/db/repos/gentoo
      sync-type = rsync
      sync-uri = rsync://rsync.gentoo.org/gentoo-portage
      auto-sync = yes
      sync-rsync-verify-jobs = 1
      sync-rsync-verify-metamanifest = yes
      sync-rsync-verify-max-age = 3
      sync-openpgp-key-package = sec-keys/openpgp-keys-gentoo-release
      sync-openpgp-key-path = /usr/share/openpgp-keys/gentoo-release.asc
      sync-openpgp-key-refresh = false-nowarn
  tasks:
    - name: refuse non-root
      ansible.builtin.command: id -u
      register: uid
      changed_when: false
      failed_when: uid.stdout != '0'

    - name: check tools
      ansible.builtin.shell: "command -v {{ item }}"
      changed_when: false
      loop: [qemu-img, mkfs.ext4, tar, systemctl]

    - name: check stage4
      ansible.builtin.stat:
        path: "{{ stage4 }}"
      register: stage4_stat
      failed_when: not stage4_stat.stat.exists

    - name: create temp build dir
      ansible.builtin.tempfile:
        state: directory
        path: /tmp
        prefix: ansible_vagrant_box_
        suffix: .tmp
      register: build_tmp

    - name: set build paths
      ansible.builtin.set_fact:
        build_dir: "{{ build_tmp.path }}"
        raw: "{{ build_tmp.path }}/root.img"
        qcow: "{{ build_tmp.path }}/box.img"
        mnt: "{{ build_tmp.path }}/mnt"

    - name: clean old build
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: ["{{ box_out }}", "{{ artifact_dir }}/vmlinuz", "{{ artifact_dir }}/initramfs"]

    - name: create build dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop: ["{{ mnt }}"]

    - name: create rootfs image
      ansible.builtin.command: "{{ item }}"
      loop:
        - "qemu-img create -f raw {{ raw }} {{ disk_gb }}G"
        - "mkfs.ext4 -F {{ raw }}"

    - block:
        - name: mount rootfs
          ansible.builtin.command: "mount -o loop {{ raw }} {{ mnt }}"

        - name: unpack stage4
          ansible.builtin.command: "tar --xattrs --xattrs-include='*.*' --numeric-owner -xpf {{ stage4 }} -C {{ mnt }}"

        - name: create vagrant config dirs
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: directory
            mode: "{{ item.mode | default(omit) }}"
          loop:
            - {path: "{{ mnt }}/root/.ssh", mode: '0700'}
            - {path: "{{ mnt }}/etc/systemd/network"}
            - {path: "{{ mnt }}/etc/portage/repos.conf"}

        - name: vagrant minimum config
          ansible.builtin.copy:
            dest: "{{ item.dest }}"
            content: "{{ item.content }}"
            mode: "{{ item.mode | default('0644') }}"
          loop:
            - {dest: "{{ mnt }}/etc/systemd/network/80-vagrant-dhcp.network", content: "[Match]\nName=en* eth*\n\n[Network]\nDHCP=yes\n"}
            - {dest: "{{ mnt }}/root/.ssh/authorized_keys", content: "{{ vagrant_pubkey }}", mode: '0600'}
            - {dest: "{{ mnt }}/etc/portage/repos.conf/gentoo.conf", content: "{{ gentoo_repos_conf }}"}

        # - name: enable services
        #   ansible.builtin.command: "systemctl --root={{ mnt }} enable sshd systemd-networkd systemd-resolved containerd kubelet keepalived"

        - name: link resolv.conf
          ansible.builtin.file:
            src: /run/systemd/resolve/stub-resolv.conf
            dest: "{{ mnt }}/etc/resolv.conf"
            state: link
            force: true

        - name: copy boot files
          ansible.builtin.shell: "cp {{ mnt }}/boot/kernel-* {{ artifact_dir }}/vmlinuz && cp {{ mnt }}/boot/initramfs-*.img {{ artifact_dir }}/initramfs"
      always:
        - name: unmount rootfs
          ansible.builtin.command: "umount {{ mnt }}"
          failed_when: false
          changed_when: false

    - name: package box
      ansible.builtin.shell: "qemu-img convert -f raw -O qcow2 {{ raw }} {{ qcow }} && printf '%s\n' '{\"provider\":\"libvirt\",\"format\":\"qcow2\",\"virtual_size\":{{ disk_gb }}}' > {{ build_dir }}/metadata.json && tar czf {{ box_out }} -C {{ build_dir }} metadata.json box.img"

    - name: clean temp build
      ansible.builtin.file:
        path: "{{ build_dir }}"
        state: absent

    - name: print box path
      ansible.builtin.debug:
        msg: "{{ box_out }}"
